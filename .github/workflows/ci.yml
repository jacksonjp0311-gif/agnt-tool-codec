name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
        node-version: ["20"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Python tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v
      - name: Benchmark gate
        run: |
          PYTHONPATH=src python -m agnt_tool_codec.eval --index capability-index.json --cases evals/demo-cases.json --min-top3 1.0 --min-covered 1.0 --min-savings 0.85
          PYTHONPATH=src python -m agnt_tool_codec.eval --index capability-index.json --cases evals/runtime-cases.json --min-top3 1.0 --min-covered 1.0 --min-savings 0.85
      - name: Node tests
        run: npm test
      - name: Build Python distributions
        run: |
          python -m pip install build
          python -m build
      - name: Check npm package contents
        run: npm pack --dry-run
