<svg width="1200" height="1450" viewBox="0 0 1200 1450" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AGNT Tool Codec benchmark findings</title>
  <desc id="desc">Mobile-safe benchmark summary. The codec reduced estimated schema tokens from 460,800 to 50,400, an 89.1 percent reduction, with 6 of 6 runtime-equivalent prompts covered and 4 of 6 strict exact-name prompts covered.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="1450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#10243A"/>
      <stop offset="1" stop-color="#081424"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B8FF8D"/>
      <stop offset="1" stop-color="#28E6A6"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE08A"/>
      <stop offset="1" stop-color="#FF9A3D"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5CF1FF"/>
      <stop offset="1" stop-color="#4B9DFF"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#2E4C68" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="1450" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="1450" rx="36" fill="url(#grid)"/>
  <path d="M90 1138C294 1006 430 1198 626 1080C828 958 934 1056 1116 946" stroke="#58F0FF" stroke-opacity="0.16" stroke-width="3"/>
  <path d="M90 202C286 304 454 128 642 236C812 334 962 174 1110 252" stroke="#A8FF8B" stroke-opacity="0.13" stroke-width="3"/>

  <text x="80" y="100" fill="#F5FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">Benchmark Finding</text>
  <text x="80" y="154" fill="#B4CCDD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28">AGNT-oriented index, six agent prompts.</text>

  <g transform="translate(80 220)">
    <rect width="1040" height="290" rx="30" fill="#0E1D2E" stroke="url(#green)" stroke-width="4"/>
    <text x="54" y="104" fill="#A8FF83" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="104" font-weight="900">89.1%</text>
    <text x="54" y="164" fill="#F5FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="800">estimated schema-token reduction</text>
    <text x="54" y="218" fill="#B4CCDD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26">Fewer tool schemas sent before the model call.</text>
  </g>

  <g transform="translate(80 560)">
    <rect width="1040" height="330" rx="30" fill="#0E1D2E" stroke="#3E5E7E" stroke-width="3"/>
    <text x="54" y="70" fill="#F5FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="800">Context Before vs After</text>

    <text x="54" y="134" fill="#FFCF70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">All tools</text>
    <rect x="54" y="158" width="830" height="44" rx="14" fill="#24364B" stroke="#5A728B" stroke-width="2"/>
    <rect x="54" y="158" width="830" height="44" rx="14" fill="url(#amber)"/>
    <text x="906" y="192" fill="#F5FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">460,800</text>

    <text x="54" y="254" fill="#A8FF83" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Codec selected</text>
    <rect x="54" y="278" width="830" height="44" rx="14" fill="#203852" stroke="#5A728B" stroke-width="2"/>
    <rect x="54" y="278" width="91" height="44" rx="14" fill="url(#green)"/>
    <text x="906" y="312" fill="#F5FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">50,400</text>
  </g>

  <g transform="translate(80 940)">
    <rect width="500" height="210" rx="28" fill="#0E1D2E" stroke="#3E5E7E" stroke-width="3"/>
    <text x="42" y="62" fill="#F5FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Coverage</text>
    <text x="42" y="126" fill="#A8FF83" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="900">6 / 6</text>
    <text x="184" y="118" fill="#F5FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800">runtime</text>
    <text x="184" y="152" fill="#B4CCDD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">equivalent hits</text>
  </g>

  <g transform="translate(620 940)">
    <rect width="500" height="210" rx="28" fill="#0E1D2E" stroke="#3E5E7E" stroke-width="3"/>
    <text x="42" y="62" fill="#F5FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Strict Match</text>
    <text x="42" y="126" fill="#FFCF70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="900">4 / 6</text>
    <text x="184" y="118" fill="#F5FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800">exact-name</text>
    <text x="184" y="152" fill="#B4CCDD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">tool hits</text>
  </g>

  <g transform="translate(80 1200)">
    <rect width="1040" height="150" rx="28" fill="#0E1D2E" stroke="url(#cyan)" stroke-width="3"/>
    <text x="42" y="58" fill="#F5FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">What this proves</text>
    <text x="42" y="104" fill="#B4CCDD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">The codec can remove repeated schema context while keeping a valid tool path.</text>
  </g>

  <text x="80" y="1400" fill="#87A4BA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Caveat: schema-token estimate. Confirm production savings with provider tokenizers and real traces.</text>
</svg>
